<!DOCTYPE html>
<html>
	<head>
		<title>Witless Web</title>
		<script src="https://telegram.org/js/telegram-web-app.js?59"></script>
	</head>
	<body>
		Page
		<script>
			async function fetchChat(chatId) {
				const res = await fetch("/chat?chat="+chatId)
				const data = await res.json()
				return data
			}

			const search = new URLSearchParams(window.location.search)
			const chatId = search.get("chat")
			if (chatId == 0) {
				// show error
			}
			const authData = window?.Telegram?.WebApp?.initData || '';
			fetch("/auth?data=" + encodeURIComponent(authData))
				.then(r => r.text())
				.then(() => fetchChat(chatId))
				.then(console.log)
				.catch(console.error) // show error
		</script>
	</body>
</html>
