<!DOCTYPE html>
<html>
	<head>
		<title>Witless Web</title>
		<script src="https://unpkg.com/cytoscape@3.30.1/dist/cytoscape.min.js"></script>
		<script src="https://unpkg.com/webcola/WebCola/cola.min.js"></script>
		<script src="https://unpkg.com/cytoscape-cola/cytoscape-cola.js"></script>
	</head>
	<body>
		<div id="graph" style="width:100%; height:100vh;"></div>
		<script>
			document.addEventListener('DOMContentLoaded', function(){
				var cy = cytoscape({
					container: document.getElementById('graph'),
					elements: [
						{ data: { id: 'a' } },
						{ data: { id: 'b' } },
						{ data: { id: 'c' } },
						{ data: { source: 'a', target: 'b' } },
						{ data: { source: 'b', target: 'c' } }
					],
					layout: {
						name: 'cola',
						// Cola layout options can be added here
						// e.g., nodeSpacing: 20, edgeLength: 50, etc.
					},
					style: [
						{
							selector: 'node',
							style: {
								'background-color': '#666',
								'label': 'data(id)'
							}
						},
						{
							selector: 'edge',
							style: {
								'width': 3,
								'line-color': '#ccc',
								'target-arrow-color': '#ccc',
								'target-arrow-shape': 'triangle'
							}
						}
					]
				});
			})
		</script>
	</body>
</html>
